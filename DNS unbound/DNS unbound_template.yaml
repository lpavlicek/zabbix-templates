          key: unbound.total_num_queries_wait_limit
          value_type: FLOAT
          units: qps
          description: |
            Recursion requests are dropped on a per-second basis when the wait-limit is reached. The wait-limit defines the maximum number of pending replies that may wait for recursion per IP address.
