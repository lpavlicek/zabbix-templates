        - uuid: 0a0467a98390422b88844c3033035cc0
          name: 'Unbound: Config option num-queries-per-thread'
          key: unbound.option.num-queries-per-thread
          delay: 30m
          description: |
            The number of queries that every thread will service simultaneously. If more queries arrive that need servicing, and no queries can be jostled out (see jostle-timeout), then the queries are dropped. This forces the client to resend after a timeout; allowing the server time to work on the existing queries. Default depends on compile options.
            
            Default: 2048 (libevent) / 512 (minievent) / 24 (windows)
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
          tags:
            - tag: component
              value: config
        - uuid: 16ce320163234d42978600ddd25b588d
          name: 'Unbound: RRset cache entries'
          type: DEPENDENT
          key: unbound.rrset_cache_count
          value_type: FLOAT
          description: 'The number of RRsets in the rrset cache. This includes rrsets used by the messages in the message cache, but also delegation information.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.rrset_cache_count
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: unbound.stats_noreset
          tags:
            - tag: component
              value: cache
        - uuid: a2b7b5517d2845ba90181ec092aa1288
          name: 'Unbound: stats_noreset'
          key: unbound.stats_noreset
          delay: 5m
          history: '0'
          value_type: TEXT
          description: |
            Unbound DNS server statistics obtained using `unbound-control stats_noreset`, which were further processed and converted to JSON using the `unbound-stats_to_json.pl` script. 
            Modifications to the script:
            - a constant list of items; if any item is missing in a specific version of unbound, it returns zero,
            - underscores are used instead of periods, e.g., mem.cache.message becomes mem_cache_message,
            - simplification of the histogram to a smaller number of items,
            - items for threads (threads0.*, threads1.*, ...),
            - less common resource record types are grouped under the "other" entry
          tags:
            - tag: stage
              value: raw
        - uuid: 5955946a52c14fb58223b47319ef4d44
          name: 'Unbound: Uptime'
          type: DEPENDENT
          key: unbound.time_up
          value_type: FLOAT
          units: s
          description: 'Time in seconds since the unbound process was started.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.time_up
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: unbound.stats_noreset
          tags:
            - tag: component
              value: general
          triggers:
            - uuid: 5f8f5e7a5109425b8a85df9ff4c9b69a
              expression: 'last(/DNS unbound/unbound.time_up) < 1h'
              name: 'Unbound: Uptime < 1h'
              opdata: '{ITEM.VALUE}'
              priority: INFO
              description: 'The unbound process has been restarted; its uptime is less than 1 hour.'
              manual_close: 'YES'
              tags:
                - tag: component
                  value: dns
                - tag: software
                  value: unbound
