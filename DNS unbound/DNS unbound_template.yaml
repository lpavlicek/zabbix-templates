            - uuid: 3eb636b317db4eb884e5b936f50d6c80
              expression: 'last(/DNS unbound/unbound.total_requestlist_overwritten) > {$UNBOUND.REQUESTLIST_OVERWRITTEN_LIMIT}'
              name: 'Unbound: Number of overwritten requests has exceeded limit'
              opdata: '{ITEM.VALUE}'
              priority: INFO
              description: 'The server is overloaded. The number of requests in the request list that were overwritten by newer entries has exceeded the limit. This happens if there is a flood of queries that recursive processing and the server has a hard time.'
              manual_close: 'YES'
              tags:
                - tag: component
                  value: dns
                - tag: software
                  value: unbound
        - uuid: 8247a993e67c40588444fd417a1087d8
          name: 'Unbound: Unwanted queries per second'
          type: DEPENDENT
          key: unbound.unwanted_queries
