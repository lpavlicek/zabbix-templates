zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1c09fe31fae4b56b41195ab9b4910ff
      name: 'lpavlicek templates'
  templates:
    - uuid: 9789efae5d914f76839269188c11dcd4
      template: 'DNS unbound'
      name: 'DNS unbound'
      description: 'A Zabbix 7.4 template for monitoring the [unbound](https://nlnetlabs.nl/projects/unbound/about/) recursive DNS resolver. Statistics are collected via `unbound-control stats_noreset` and converted to JSON by a Perl helper script, enabling efficient dependent-item collection with a single external call every 5 minutes.'
      vendor:
        name: lpavlicek
        version: 7.4-1
      groups:
        - name: 'lpavlicek templates'
      items:
        - uuid: b0bc2e24a80f4033be7d1d29662245a7
          name: 'Unbound: Error message'
          type: DEPENDENT
          key: unbound.error_msg
          value_type: CHAR
          description: 'Error message when retrieving statistics from unbound.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.error_msg
              error_handler: CUSTOM_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: unbound.stats_noreset
          triggers:
            - uuid: 0bea761ec559454d891e95925da3313e
              expression: 'length(last(/DNS unbound/unbound.error_msg))>0'
              name: 'Unbound: Error message'
              opdata: '{ITEM.VALUE}'
              priority: AVERAGE
              description: 'Error retrieving statistics. For example, the unbound process is not running.'
              tags:
                - tag: component
                  value: dns
                - tag: software
                  value: unbound
        - uuid: 3ab03f32db174fb38fa03ea6c37f0874
          name: 'Unbound: Queries with reply time between 0.000s and 0.016s'
          type: DEPENDENT
          key: unbound.histogram_0ms_16ms
          value_type: FLOAT
          units: qps
          description: 'Element counts the recursive queries whose reply time fit between the lower and upper bound. Times larger or equal to the lower bound, and smaller than the upper bound.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.histogram_0ms_16ms
            - type: CHANGE_PER_SECOND
          master_item:
            key: unbound.stats_noreset
          tags:
            - tag: component
              value: histogram
        - uuid: 9e302ef0be764d47aee0f409107797c9
          name: 'Unbound: Queries with reply time between 1s and 2s'
          type: DEPENDENT
          key: unbound.histogram_1s_2s
          value_type: FLOAT
          units: qps
          description: 'Element counts the recursive queries whose reply time fit between the lower and upper bound. Times larger or equal to the lower bound, and smaller than the upper bound.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.histogram_1s_2s
