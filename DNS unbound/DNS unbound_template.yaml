        - uuid: 5f173cb8efb449beb8c93147bd5659f7
          name: 'Unbound: Unwanted replies per second'
          type: DEPENDENT
          key: unbound.unwanted_replies
          value_type: FLOAT
          units: qps
          description: 'Replies per second that were unwanted or unsolicited. Could have been random traffic, delayed duplicates, very late answers, or could be spoofing attempts. Some low level of late answers and delayed duplicates are to be expected with the UDP protocol. Very high values could indicate a threat (spoofing).'
