# =============================================================================
# userparameter_ollama.conf
# Zabbix UserParameters for Ollama monitoring
# =============================================================================
# Requires: /usr/local/bin/zabbix_ollama.sh (chmod +x, owned by root)
#
# Macro mapping:
#   $1 = {$OLLAMA.PORT}          (all actions)
#   $2 = {$OLLAMA.PROBE.MODEL}   (probe only)
#   $3 = {$OLLAMA.PROBE.KEEP_ALIVE} (probe only)
#
# Input validation and error handling is done in the wrapper script.
# UnsafeUserParameters=0 (default) is sufficient and recommended.
# =============================================================================

# Ollama version
UserParameter=ollama.version.get[*],/etc/zabbix/scripts/ollama/zabbix_ollama.sh version "$1"

# List models available locally
UserParameter=ollama.models.available.get[*],/etc/zabbix/scripts/ollama/zabbix_ollama.sh models "$1"

# List models currently loaded in memory (VRAM)
UserParameter=ollama.models.loaded.get[*],/etc/zabbix/scripts/ollama/zabbix_ollama.sh loaded "$1"

# Run inference probe - returns full JSON response including timings and potential errors
UserParameter=ollama.probe.get[*],/etc/zabbix/scripts/ollama/zabbix_ollama.sh probe "$1" "$2" "$3"
