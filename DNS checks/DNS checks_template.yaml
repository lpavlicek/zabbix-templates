zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1c09fe31fae4b56b41195ab9b4910ff
      name: 'lpavlicek templates'
  templates:
    - uuid: 26327cfe43cf4c1eb3a35b660913a2c1
      template: 'DNS Check'
      name: 'DNS Check'
      description: |
        Template for monitoring DNS record availability and transport protocol support.
        Runs agentlessly from the Zabbix server or proxy.
        
        Requires two external check scripts placed in the ExternalScripts directory:
          dns_check.sh      — DNS record existence checks (uses kdig)
          dns_proto_check.sh — DNS transport protocol response time checks (uses kdig)
        
        Both scripts require kdig from the knot-dnsutils (Debian/Ubuntu) or knot-utils (RHEL/CentOS) package.
        
        All checks query the host's address as configured on the host interface ({HOST.CONN}).
        
        DNS RECORD CHECKS
        Configured via {$DNS.QUERIES} as a comma-separated list of type:name pairs.
        Supported types: a, aaaa, mx, ns, soa, txt, ptr, cname
        A check fails when the server does not respond, returns NXDOMAIN, SERVFAIL, or returns no record of the requested type.
        
        DNS PROTOCOL CHECKS
        Configured via {$DNS.PROTOCOLS} as a colon-separated list of protocol names.
        Supported protocols: udp, tcp, tls, https, quic
        Each check sends an A record query for {$DNS.PROTO.QUERY} and measures
        the response time in milliseconds. Returns -1 on failure.
        
        LLD discovery for both check types requires no additional scripts — query and protocol lists are read from macros via CALCULATED items and JavaScript preprocessing.
      vendor:
        name: lpavlicek
        version: 7.4-2
      groups:
        - name: 'lpavlicek templates'
      items:
        - uuid: 78f7faa4a5b54871b56141a5165c8b0b
          name: 'DNS protocols list'
          type: CALCULATED
          key: dns.proto.list
          delay: '{$DNS.LLD.INTERVAL}'
          history: '0'
          value_type: TEXT
          params: 'concat("{$DNS.PROTOCOLS}","")'
          description: |
            Master item for LLD discovery of DNS protocol checks.
            Reads the {$DNS.PROTOCOLS} macro value and passes it to the dependent discovery rule.
            History is disabled — this item serves only as a data source for LLD,
            its value does not need to be stored.
            
            Format: colon-separated list of protocols
            Example: udp:tcp:tls:https:quic
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
          tags:
            - tag: component
              value: dns
        - uuid: aac333a157784c6188a0e2316bf807ec
          name: 'DNS protocols overall status'
          type: CALCULATED
          key: dns.proto.overall.status
          delay: 2m
          value_type: FLOAT
          units: s
          params: 'min(last_foreach(//dns_proto_check.sh[*,*,*,*]))'
          description: |
            Aggregated result across all configured DNS protocol checks on this host.
            Returns the minimum value across all dns_proto_check.sh items after conversion from milliseconds to seconds (multiplied by 0.001):
            <0  = at least one protocol check failed or is not supported
            >=0 = all protocols responded; value is the fastest response time in seconds
          valuemap:
            name: 'DNS protocol overall status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: dns
        - uuid: f43adbc472a2418cbdf32732f0f27ecf
          name: 'DNS records overall status'
          type: CALCULATED
          key: dns.records.overall.status
          delay: 2m
          params: 'min(last_foreach(//dns_check.sh[*,*,*,*]))'
          description: |
            Aggregated status across all DNS record checks on this host.
            Returns the minimum value across all dns_check.sh items: 
            1 = all records found (OK)
            0 = at least one record not found or query failed (FAIL)
          valuemap:
            name: 'DNS records overall status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: dns
        - uuid: b877a4737dc3441792edb865c953b6f8
          name: 'DNS records queries list'
          type: CALCULATED
          key: dns.records.queries.list
          delay: '{$DNS.LLD.INTERVAL}'
          history: '0'
          value_type: TEXT
          params: 'concat("{$DNS.QUERIES}","")'
          description: |
            Master item for LLD discovery of DNS record checks.
            Reads the {$DNS.QUERIES} macro value and passes it to the dependent discovery rule.
            History is disabled — this item serves only as a data source for LLD, its value does not need to be stored.
            
            Format: type:name,type:name,...
            Example: soa:vse.cz,a:www.cms2.cz,txt:txt1500.ue-prague.cz
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
          tags:
            - tag: component
              value: dns
      discovery_rules:
        - uuid: f425056f3fd449f793b95518c1110656
          name: 'DNS protocols discovery'
          type: DEPENDENT
          key: dns.proto.discovery
          lifetime: 30d
          description: |
            LLD discovery rule dependent on the dns.proto.list master item.
            JavaScript preprocessing splits the colon-separated protocol list, validates each entry against the list of supported protocols, and generates a {#DNS_PROTO} LLD macro for each valid entry. 
            Discovered items are removed after 30 days if no longer present in the protocol list.
          item_prototypes:
            - uuid: d2adb5dad9db465e9de3180893659eaa
              name: 'DNS response time for {#DNS_PROTO}'
              type: EXTERNAL
              key: 'dns_proto_check.sh["{#DNS_PROTO}","{HOST.CONN}","{$DNS.PROTO.QUERY}","{$DNS.TIMEOUT}"]'
              delay: '{$DNS.PROTO.CHECK.INTERVAL}'
              value_type: FLOAT
              units: s
              description: |
                Response time for a DNS A record query for {$DNS.PROTO.QUERY} sent via {#DNS_PROTO} to the host's address ({HOST.CONN}).
                The script returns milliseconds; the value is multiplied by 0.001 to convert to seconds.
                <0  = protocol not supported, connection refused, or query timed out
                >=0 = successful query; value is the response time in seconds
              valuemap:
                name: 'DNS protocol check status'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.001'
              tags:
                - tag: component
                  value: dns
                - tag: dns_proto
                  value: '{#DNS_PROTO}'
              trigger_prototypes:
                - uuid: d098e8a86fa24549883e8893da1ffc5b
                  expression: 'last(/DNS Check/dns_proto_check.sh["{#DNS_PROTO}","{HOST.CONN}","{$DNS.PROTO.QUERY}","{$DNS.TIMEOUT}"])<0'
                  name: 'DNS {#DNS_PROTO}: protocol not supported or query failed on {HOST.NAME}'
                  priority: HIGH
                  description: |
                    DNS query via {#DNS_PROTO} to {HOST.CONN} failed. The server does not support this protocol, refused the connection, or the query timed out.
                    Query name: {$DNS.PROTO.QUERY}
                  tags:
                    - tag: component
                      value: dns
                    - tag: scope
                      value: availability
          master_item:
            key: dns.proto.list
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var protos = value.split(':').map(function(p) { return p.trim().toLowerCase(); }).filter(function(p) { return p.length > 0; });
                  var valid = ['udp', 'tcp', 'tls', 'https', 'quic'];
                  var result = [];
                  for (var i = 0; i < protos.length; i++) {
                    if (valid.indexOf(protos[i]) === -1) continue;
                    result.push({ "{#DNS_PROTO}": protos[i] });
                  }
                  return JSON.stringify(result);
        - uuid: 79f7cd62fd764978b1b04e737518b63b
          name: 'DNS queries discovery'
          type: DEPENDENT
          key: dns.queries.discovery
          description: |
            LLD discovery rule dependent on the dns.records.queries.list master item.
            JavaScript preprocessing splits the comma-separated query list and generates {#DNS_TYPE} and {#DNS_NAME} LLD macros for each entry.
            Discovered items are removed after 7 days if no longer present in the query list.
          item_prototypes:
            - uuid: 81767521ce1a469090e3744573160014
              name: 'DNS check: {#DNS_TYPE}:{#DNS_NAME}'
              type: EXTERNAL
              key: 'dns_check.sh["{#DNS_TYPE}","{#DNS_NAME}","{HOST.CONN}","{$DNS.TIMEOUT}"]'
              delay: '{$DNS.CHECK.INTERVAL}'
              description: |
                Result of DNS query for record type {#DNS_TYPE} and name {#DNS_NAME}
                sent to the host's address ({HOST.CONN}).
                1 = record found (OK)
                0 = record not found or query failed (PROBLEM)
              valuemap:
                name: 'DNS records check status'
              tags:
                - tag: component
                  value: dns
                - tag: dns_name
                  value: '{#DNS_NAME}'
                - tag: dns_type
                  value: '{#DNS_TYPE}'
              trigger_prototypes:
                - uuid: 096709bfd399402b946b2efad50306a9
                  expression: 'last(/DNS Check/dns_check.sh["{#DNS_TYPE}","{#DNS_NAME}","{HOST.CONN}","{$DNS.TIMEOUT}"])=0'
                  name: 'DNS: {#DNS_TYPE}:{#DNS_NAME} - record not found or query failed'
                  priority: HIGH
                  description: |
                    DNS query {#DNS_TYPE}:{#DNS_NAME} failed.
                    The DNS server did not respond, returned NXDOMAIN, SERVFAIL, or no record of the requested type was found.
                  tags:
                    - tag: component
                      value: dns
                    - tag: scope
                      value: availability
          master_item:
            key: dns.records.queries.list
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var queries = value.split(',').map(function(q) { return q.trim(); }).filter(function(q) { return q.length > 0; });
                  var result = [];
                  for (var i = 0; i < queries.length; i++) {
                    var sep = queries[i].indexOf(':');
                    if (sep < 1) continue;
                    var type = queries[i].substring(0, sep).toLowerCase();
                    var name = queries[i].substring(sep + 1);
                    if (!name) continue;
                    result.push({
                      "{#DNS_TYPE}": type,
                      "{#DNS_NAME}": name
                    });
                  }
                  return JSON.stringify(result);
      tags:
        - tag: component
          value: dns
      macros:
        - macro: '{$DNS.CHECK.INTERVAL}'
          value: 5m
          description: 'Interval for DNS record checks (external check execution).'
        - macro: '{$DNS.LLD.INTERVAL}'
          value: 1h
          description: 'Interval for LLD discovery (how often the query and protocol list macros are re-read).'
        - macro: '{$DNS.PROTO.CHECK.INTERVAL}'
          value: 5m
          description: 'Interval for DNS protocol checks (external check execution).'
        - macro: '{$DNS.PROTO.QUERY}'
          value: www.vse.cz
          description: 'Domain name used as the A record query target for all DNS protocol checks.'
        - macro: '{$DNS.PROTOCOLS}'
          value: 'udp:tcp'
          description: 'Colon-separated list of DNS transport protocols to test. Supported values: udp, tcp, tls, https, quic  Example: udp:tcp:tls:https:quic'
        - macro: '{$DNS.QUERIES}'
          value: 'soa:vse.cz,soa:102.146.in-addr.arpa'
          description: 'Comma-separated list of DNS queries in the format type:name. Supported types: a, aaaa, mx, ns, soa, txt, ptr, cname Example: soa:vse.cz,a:www.cms2.cz,txt:txt1500.ue-prague.cz'
        - macro: '{$DNS.TIMEOUT}'
          value: '2'
          description: 'Timeout for DNS queries in seconds. Applies to both dns_check.sh and dns_proto_check.sh. Note: Zabbix external check default execution timeout is 3 seconds.'
      valuemaps:
        - uuid: 5ef51702def542a0ab33da3c118a5079
          name: 'DNS protocol check status'
          mappings:
            - type: LESS_OR_EQUAL
              value: '0'
              newvalue: 'FAIL - not supported or timeout'
        - uuid: 71c6a66e14fa43baa0cd6c9c78773d4b
          name: 'DNS protocol overall status'
          mappings:
            - type: LESS_OR_EQUAL
              value: '0'
              newvalue: 'Some FAIL'
        - uuid: 6b8e70e82140465299a5c75598edd10a
          name: 'DNS records check status'
          mappings:
            - value: '0'
              newvalue: 'FAIL - record not found'
            - value: '1'
              newvalue: 'OK - record found'
        - uuid: ee2cb717f25f4071a4604acd9323734d
          name: 'DNS records overall status'
          mappings:
            - value: '0'
              newvalue: 'Some FAIL'
            - value: '1'
              newvalue: 'All OK'
